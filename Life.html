<h2>🎧 ПРЯМОЙ ЭФИР</h2>

<p id="now">Загрузка эфира...</p>

<button onclick="playRadio()">▶</button>
<button onclick="pauseRadio()">⏸</button>

<audio id="audio"></audio>

<script>
let tracks = [
  {
    url: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3",
    title: "🎵 Трек 1"
  },
  {
    url: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3",
    title: "🎵 Трек 2"
  },
  {
    url: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-3.mp3",
    title: "🎵 Трек 3"
  }
];

let audio = document.getElementById("audio");

function getCurrentTrack() {
  // меняем трек каждые 2 минуты
  let now = Math.floor(Date.now() / 120000);
  return tracks[now % tracks.length];
}

function updateRadio() {
  let current = getCurrentTrack();

  if (audio.src !== current.url) {
    audio.src = current.url;
    audio.play();
  }

  document.getElementById("now").innerText =
    "🎧 Сейчас в эфире:\n" + current.title;
}

// кнопки
function playRadio() {
  audio.play();
}

function pauseRadio() {
  audio.pause();
}

// обновление каждые 3 секунды
setInterval(updateRadio, 3000);
updateRadio();
</script>
